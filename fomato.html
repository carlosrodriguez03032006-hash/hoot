<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pecado Real | Experiencia Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --rojo-pasion: #ff0000;
            --negro-absoluto: #050505;
            --dorado-brillo: rgba(212, 175, 55, 0.4);
            --vidrio: rgba(15, 15, 15, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--negro-absoluto);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* --- FONDO DINÁMICO --- */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('WhatsApp Image 2026-04-04 at 8.36.29 PM.jpeg');
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            z-index: -1;
            animation: bgZoom 25s infinite alternate ease-in-out;
        }

        @keyframes bgZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .container { width: 94%; max-width: 1100px; margin: auto; }

        /* --- HEADER OPTIMIZADO --- */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.2rem, 12vw, 5rem);
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            margin-bottom: 5px;
        }

        .scroll-arrow {
            position: absolute;
            bottom: 30px;
            font-size: 2rem;
            color: var(--rojo-pasion);
            animation: bounce 2s infinite;
            cursor: pointer;
            text-shadow: 0 0 10px var(--rojo-pasion);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- TARJETA PRINCIPAL --- */
        .main-card {
            background: var(--vidrio);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 25px;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 80px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        @media (min-width: 900px) {
            .main-card { display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 50px; }
        }

        /* --- CARRUSEL --- */
        .carousel-box {
            position: relative;
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: 0.8s ease-in-out;
            filter: drop-shadow(0 0 15px var(--rojo-pasion));
        }

        .slide.active { opacity: 1; transform: scale(1.05); }

        /* --- FORMULARIO --- */
        .form-box h2 { 
            font-family: 'Cinzel'; 
            margin-bottom: 20px; 
            font-size: 1.6rem; 
            text-align: center;
            letter-spacing: 2px;
        }

        .input-row { display: flex; flex-direction: column; }
        @media (min-width: 600px) { .input-row { flex-direction: row; gap: 15px; } }

        .input-group { margin-bottom: 15px; width: 100%; text-align: left; }
        
        .input-group label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 16px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-family: 'Montserrat';
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--rojo-pasion);
            outline: none;
            box-shadow: 0 0 10px rgba(255,0,0,0.2);
        }

        .btn-confirm {
            width: 100%;
            padding: 22px;
            background: linear-gradient(90deg, #900, #f00);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.4);
        }

        .badge-co {
            text-align: center;
            background: rgba(255,0,0,0.1);
            border: 1px dashed var(--rojo-pasion);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 0.8rem;
            color: #fff;
            font-weight: 900;
        }

        footer { padding: 40px; text-align: center; opacity: 0.4; font-size: 0.7rem; letter-spacing: 2px; }

        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <header>
        <div class="container reveal">
            <h1 class="hero-title">PECADO REAL</h1>
            <p style="letter-spacing: 6px; color: #666; font-size: 0.75rem; font-weight: 900;">LUXURY PLEASURE PACK</p>
        </div>
        <div class="scroll-arrow" onclick="document.getElementById('seccion-pedido').scrollIntoView({behavior: 'smooth'})">↓</div>
    </header>

    <div class="container" id="seccion-pedido">
        <main class="main-card reveal">
            <div class="carousel-box">
                <img src="imagen1.jpeg" class="slide active" alt="Pack 1">
                <img src="imagen2.png" class="slide" alt="Pack 2">
            </div>

            <div class="form-box">
                <div class="badge-co">🇨🇴 PAGO CONTRA ENTREGA - COLOMBIA</div>
                <h2>ORDENAR AHORA</h2>
                
                <form id="checkoutForm">
                    <div class="input-group">
                        <label>Nombre y Apellido</label>
                        <input type="text" id="nombre" placeholder="Ej: Carlos Rodríguez" required>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Celular</label>
                            <input type="tel" id="tel" placeholder="310..." required>
                        </div>
                        <div class="input-group">
                            <label>Ciudad</label>
                            <input type="text" id="ciudad" placeholder="Cali" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Dirección de Entrega</label>
                        <input type="text" id="dir" placeholder="Calle, barrio, casa o apto" required>
                    </div>

                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>

                    <button type="submit" class="btn-confirm">PEDIR POR WHATSAPP 🔥</button>
                </form>
            </div>
        </main>
    </div>

    <footer>&copy; 2026 PECADO REAL. TODOS LOS DERECHOS RESERVADOS.</footer>

    <script>
        // --- REVELAR AL HACER SCROLL ---
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            reveals.forEach(el => {
                var windowHeight = window.innerHeight;
                var elementTop = el.getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) {
                    el.classList.add("active");
                }
            });
        }
        window.addEventListener("scroll", reveal);
        window.onload = reveal;

        // --- CARRUSEL AUTOMÁTICO ---
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        if(slides.length > 0) {
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 4000);
        }

        // --- ENVÍO A WHATSAPP ---
        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const n = document.getElementById('nombre').value;
            const t = document.getElementById('tel').value;
            const c = document.getElementById('ciudad').value;
            const d = document.getElementById('dir').value;
            const m = document.getElementById('email').value;

            // Mensaje completo incluyendo Pago Contra Entrega
            const fullMessage = `*PECADO REAL - NUEVA ORDEN*\n\n` +
                               `👤 *Cliente:* ${n}\n` +
                               `📱 *Celular:* ${t}\n` +
                               `📧 *Email:* ${m}\n` +
                               `📍 *Ciudad:* ${c}\n` +
                               `🏠 *Dirección:* ${d}\n` +
                               `🚚 *Envío:* Pago Contra Entrega`;
            
            // Codificación segura para que no se corte la dirección con #
            const encodedText = encodeURIComponent(fullMessage);
            
            window.location.href = `https://wa.me/573026204874?text=${encodedText}`; 
        });
    </script>
</body>
</html>
